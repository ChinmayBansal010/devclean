name: build-test-package

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-cmake@v1
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build -j2
      - name: Test
        run: ./build/devclean_tests
      - name: Package
        run: cpack --config build/CPackConfig.cmake
